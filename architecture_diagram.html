<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🤖 Trading Agent Architecture</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0f1a; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const COLORS = {
      data:        { bg: "#1e3a5f", border: "#3b82f6", text: "#93c5fd", label: "#60a5fa" },
      perceive:    { bg: "#1a3a2a", border: "#22c55e", text: "#86efac", label: "#4ade80" },
      classify:    { bg: "#2d2a1a", border: "#eab308", text: "#fde68a", label: "#facc15" },
      plan:        { bg: "#2d1a3a", border: "#a855f7", text: "#d8b4fe", label: "#c084fc" },
      risk:        { bg: "#3a1a1a", border: "#ef4444", text: "#fca5a5", label: "#f87171" },
      llm:         { bg: "#1a2d3a", border: "#06b6d4", text: "#a5f3fc", label: "#22d3ee" },
      execute:     { bg: "#1a2a1a", border: "#10b981", text: "#6ee7b7", label: "#34d399" },
      monitor:     { bg: "#3a2a1a", border: "#f97316", text: "#fed7aa", label: "#fb923c" },
      intelligence:{ bg: "#1a1a3a", border: "#8b5cf6", text: "#c4b5fd", label: "#a78bfa" },
      sentiment:   { bg: "#1a2e3a", border: "#6366f1", text: "#c7d2fe", label: "#818cf8" },
      storage:     { bg: "#1f1a2e", border: "#6d28d9", text: "#ddd6fe", label: "#a78bfa" },
      alpaca:      { bg: "#0f2a1f", border: "#059669", text: "#6ee7b7", label: "#34d399" },
      guard:       { bg: "#2a1f0a", border: "#f59e0b", text: "#fcd34d", label: "#fbbf24" },
      report:      { bg: "#1a2a2a", border: "#0d9488", text: "#99f6e4", label: "#2dd4bf" },
    };

    const Box = ({ color, title, items = [], icon, onClick, active }) => (
      <div
        onClick={onClick}
        style={{
          background: color.bg,
          border: `2px solid ${active ? "#fff" : color.border}`,
          borderRadius: 10,
          padding: "10px 14px",
          flex: 1,
          cursor: onClick ? "pointer" : "default",
          boxShadow: active ? `0 0 16px ${color.border}` : `0 0 6px ${color.border}44`,
          transition: "all 0.2s",
          minWidth: 0,
        }}
      >
        <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: items.length ? 6 : 0 }}>
          {icon && <span style={{ fontSize: 16 }}>{icon}</span>}
          <span style={{ color: color.label, fontWeight: 700, fontSize: 13, letterSpacing: 0.3 }}>{title}</span>
        </div>
        {items.map((item, i) => (
          <div key={i} style={{ color: color.text, fontSize: 11.5, marginTop: 3, paddingLeft: 4,
            borderLeft: `2px solid ${color.border}55` }}>
            {item}
          </div>
        ))}
      </div>
    );

    const Arrow = ({ color = "#475569", style = {} }) => (
      <div style={{ display: "flex", alignItems: "center", justifyContent: "center",
        flexShrink: 0, width: 24, ...style }}>
        <div style={{
          background: `linear-gradient(to right, ${color}44, ${color})`,
          height: 2, width: "100%", position: "relative",
        }}>
          <div style={{
            position: "absolute", right: -1, top: "50%",
            transform: "translateY(-50%)", width: 0, height: 0,
            borderTop: "4px solid transparent",
            borderBottom: "4px solid transparent",
            borderLeft: `6px solid ${color}`,
          }} />
        </div>
      </div>
    );

    const DETAILS = {
      perceive: {
        title: "Phase I — Perceive",
        color: COLORS.perceive,
        desc: "Fetches 200 days of historical price data via yfinance and real-time quotes via Alpaca snapshot API.",
        bullets: [
          "yfinance → 200-day OHLCV for SMA/RSI/Bollinger computation",
          "Alpaca snapshot API → real-time price for regime decisions",
          "Hybrid architecture: historical accuracy + real-time precision",
        ],
        file: "market_data.py",
      },
      classify: {
        title: "Phase II — Classify",
        color: COLORS.classify,
        desc: "Determines market regime by comparing price to SMAs, measuring trend momentum, and detecting mean-reversion setups.",
        bullets: [
          "Bullish: Price > SMA-200, SMA-50 slope upward → Bull Put Spread",
          "Bearish: Price < SMA-200, SMA-50 slope downward → Bear Call Spread",
          "Sideways: Oscillating between SMAs, BB narrowing → Iron Condor",
          "Mean Reversion: Price touches 3-std Bollinger Band → counter-trend entry",
          "RSI-14 used as confirmation signal",
          "RS vs SPY/QQQ: relative strength bias informs strike selection",
          "IV Rank computed for high-IV warning (> 95th pct blocks new entries)",
          "Macro Guard: price < SMA-200 blocks Bull Put Spreads",
        ],
        file: "regime.py",
      },
      plan: {
        title: "Phase III — Plan",
        color: COLORS.plan,
        desc: "Selects optimal strikes from the options chain based on regime and target delta.",
        bullets: [
          "Sold strike: |delta| ≤ MAX_DELTA (default 0.20, ≈80% probability OTM)",
          "Spread width: $5 between sold and bought strikes",
          "Target DTE: nearest Friday inside the configured DTE band",
          "Iron Condor: combines bull put + bear call spreads",
          "Mean Reversion trades: uses 3-std BB touch as entry trigger",
          "RS bias: adjusts strike selection based on relative strength vs SPY/QQQ",
        ],
        file: "strategy.py",
      },
      risk: {
        title: "Phase IV — Risk",
        color: COLORS.risk,
        desc: "Non-negotiable guardrails. All 8 checks must pass or trade is rejected.",
        bullets: [
          "✓ Plan structurally valid",
          "✓ Credit/Width ≥ MIN_CREDIT_RATIO (default 0.33)",
          "✓ Sold |delta| ≤ MAX_DELTA (default 0.20, OTM, high probability)",
          "✓ Max loss ≤ MAX_RISK_PCT × equity (default 2%)",
          "✓ Account type = paper only",
          "✓ Market must be open",
          "✓ Underlying bid/ask spread < LIQUIDITY_MAX_SPREAD (default $0.05)",
          "✓ Buying power used ≤ MAX_BUYING_POWER_PCT (default 80%)",
        ],
        file: "risk_manager.py",
      },
      llm: {
        title: "Phase V — LLM Analysis",
        color: COLORS.llm,
        desc: "Intelligence layer that reviews trades, consults trade history via RAG, and decides approve/modify/skip.",
        bullets: [
          "Queries RAG for similar past trades and outcomes",
          "Retrieves relevant lessons from the knowledge base",
          "Consumes VerifiedSentimentReport via SentimentReadout protocol",
          "Reviews performance stats (win rate, avg P&L)",
          "Outputs: action, confidence, reasoning, warnings",
          "SAFETY: Cannot override risk manager rejections — only tightens",
        ],
        file: "llm_analyst.py",
      },
      monitor: {
        title: "Stage 1 — Monitor",
        color: COLORS.monitor,
        desc: "Runs before new trade entries every cycle. Manages open positions against exit thresholds.",
        bullets: [
          "Stop-Loss: close if unrealized loss ≥ 50% of max loss",
          "Profit-Target: close if unrealized profit ≥ 75% of credit",
          "Regime-Shift: close immediately if regime contradicts strategy",
          "Triggers post-trade LLM analysis on close",
        ],
        file: "position_monitor.py",
      },
      intelligence: {
        title: "Intelligence Layer",
        color: COLORS.intelligence,
        desc: "The learning system. Builds institutional memory over time and improves decisions.",
        bullets: [
          "LLM Client: OpenAI-compatible + make_llm_client(role) factory (one config per role)",
          "Trade Journal: full lifecycle logging for every trade",
          "Journal KB: structured signal/error/defense logging (signals.jsonl)",
          "Knowledge Base: file-based RAG with cosine similarity search",
          "Embeddings: nomic-embed-text (768-dimensional vectors)",
        ],
        file: "llm_client.py + trade_journal.py + journal_kb.py + knowledge_base.py",
      },
      sentiment_pipeline: {
        title: "Sentiment Pipeline (facade)",
        color: COLORS.intelligence,
        desc: "Three-tier orchestrator that gates every cycle's sentiment work without weakening anti-hallucination — each tier is stricter than the next, not looser.",
        bullets: [
          "Tier 0 — Earnings calendar short-circuit (authoritative event_risk=1.0)",
          "Tier 1 — Content-hash cache replays previously-verified reports",
          "Tier 2 — NewsAggregator → FinGPT specialist → Reasoning verifier",
          "Cycle-scoped ThreadPoolExecutor via __enter__/__exit__",
          "submit() Future is cancelled when Phase III/IV reject the trade",
          "Cache only ever holds reports that passed the verifier",
        ],
        file: "sentiment_pipeline.py",
      },
      earnings: {
        title: "Tier 0 — Earnings Calendar",
        color: COLORS.guard,
        desc: "Authoritative short-circuit backed by yfinance's get_earnings_dates. When tomorrow is an earnings day, no LLM reasoning should override it — it's a binary, known-with-certainty catalyst.",
        bullets: [
          "yfinance.get_earnings_dates(limit=6) primary, .calendar fallback",
          "Per-ticker 12h cache (twice per trading day)",
          "Returns deterministic VerifiedSentimentReport: event_risk=1.0, recommendation=avoid",
          "EARNINGS_CALENDAR_LOOKAHEAD_DAYS=7 (configurable)",
          "Failures degrade to 'unknown' — pipeline runs full chain instead of short-circuiting",
        ],
        file: "earnings_calendar.py",
      },
      hashcache: {
        title: "Tier 1 — Content-Hash Cache",
        color: COLORS.intelligence,
        desc: "SHA-1 fingerprint over the normalised news evidence — replays a previously-verified report when the news set is unchanged. Tier-1 only stores reports that passed the verifier.",
        bullets: [
          "Hash key: sorted source | form_type | slug | minute_timestamp",
          "Tolerates re-orderings and sub-minute timestamp jitter",
          "Genuinely new items (or new minute) bust the hash",
          "TTL = max(NEWS_CACHE_TTL, FINGPT_CACHE_TTL); LRU bound = SENTIMENT_HASH_CACHE_SIZE",
          "Per-(ticker, news_hash) keying — cross-ticker collisions impossible",
        ],
        file: "sentiment_cache.py",
      },
      news: {
        title: "Tier 2 — NewsAggregator",
        color: COLORS.intelligence,
        desc: "Parallel multi-source fetcher with TTL caching. Source authority weights are configurable via NEWS_SOURCE_WEIGHTS_JSON.",
        bullets: [
          "SEC EDGAR (1.00) · Federal Reserve (0.95) · Yahoo (0.70)",
          "Twitter (0.50) · Reddit r/options/stocks (0.45) · r/wsb (0.35)",
          "Per-(ticker, source) TTL cache — default 240s",
          "Sources degrade gracefully on missing credentials / API errors",
          "Dedupes by slug across sources",
        ],
        file: "news_aggregator.py",
      },
      fingpt: {
        title: "Tier 2 — FinGPT Specialist",
        color: COLORS.intelligence,
        desc: "Locally-hosted finance LLM that scores aggregated news with source authority context baked into the prompt. Items are sorted by weight so SEC outranks Reddit before scoring.",
        bullets: [
          "Output: SentimentReport (sentiment_score, event_risk, confidence, recommendation)",
          "FINGPT_TEMPERATURE=0.1 — deterministic scoring",
          "FINGPT_TIMEOUT=45s — kept tight to protect 5-min budget",
          "Built via make_llm_client('fingpt', cfg) — no hard-coded LLMConfig",
        ],
        file: "fingpt_analyser.py",
      },
      verifier: {
        title: "Tier 2 — Reasoning Verifier",
        color: COLORS.intelligence,
        desc: "Stronger reasoning model independently cross-checks every claim in FinGPT's output against the raw evidence. Anti-hallucination gate.",
        bullets: [
          "Maps each claim to a specific evidence item (supported/partial/unsupported)",
          "Flags claims not present in the evidence as hallucinations",
          "Output: VerifiedSentimentReport with agreement_score + hallucination_flags",
          "Local: qwq:32b / deepseek-r1:32b   Cloud: claude-sonnet-4-6",
          "On verifier error → passthrough (never blocks the cycle)",
        ],
        file: "sentiment_verifier.py",
      },
      finetune: {
        title: "Fine-Tuning Pipeline",
        color: COLORS.storage,
        desc: "Exports accumulated trade data for training your local model on your own trading history.",
        bullets: [
          "Chat JSONL format: for Ollama/LM Studio fine-tuning",
          "Alpaca format: for LoRA/QLoRA instruction tuning",
          "DPO preference pairs: win trades (chosen) vs loss trades (rejected)",
          "Requires 20+ closed trades to export",
        ],
        file: "fine_tuning.py",
      },
      guards: {
        title: "Cycle Guards",
        color: COLORS.guard,
        desc: "Three agent-level safety checks that run at the start of every cycle before any market activity.",
        bullets: [
          "After-Hours Shutdown: exits cleanly outside 9:25 AM–4:05 PM ET Mon–Fri (bypass: FORCE_MARKET_OPEN=true)",
          "Daily Drawdown Circuit Breaker: halts all trading if equity drops beyond daily_drawdown_limit from day-start equity",
          "Liquidation Mode: skips all new entries if buying power > 80% used — only monitors existing positions",
        ],
        file: "agent.py (_is_within_market_hours, _check_daily_drawdown, _check_liquidation_mode)",
      },
      reporting: {
        title: "Reporting",
        color: COLORS.report,
        desc: "Generates HTML reports and dashboards from logged signals and trade plans.",
        bullets: [
          "visualize_logs.py → daily_report.html (Heartbeat Timeline, Safety Buffer, Logic Distribution)",
          "trade_plan_report.py → trade_plan_{TICKER}.html (8-section per-ticker HTML report)",
          "Reads signals.jsonl + trade_plan_*.json",
          "Run manually or via cron (*/5 10-15 * * 1-5)",
        ],
        file: "visualize_logs.py + trade_plan_report.py",
      },
    };

    function App() {
      const [active, setActive] = useState(null);
      const toggle = (key) => setActive(active === key ? null : key);
      const detail = active ? DETAILS[active] : null;

      return (
        <div style={{
          background: "#0a0f1a",
          minHeight: "100vh",
          padding: "24px 20px",
          fontFamily: "'Inter', 'Segoe UI', sans-serif",
          color: "#e2e8f0",
        }}>
          {/* Title */}
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <h1 style={{ fontSize: 22, fontWeight: 800, color: "#f1f5f9", margin: 0, letterSpacing: -0.5 }}>
              🤖 Autonomous Options Trading Agent
            </h1>
            <p style={{ color: "#64748b", fontSize: 13, margin: "6px 0 0" }}>
              Architecture — click any component for details
            </p>
          </div>

          {/* Detail Panel */}
          {detail && (
            <div style={{
              background: detail.color.bg,
              border: `2px solid ${detail.color.border}`,
              borderRadius: 12,
              padding: "14px 18px",
              marginBottom: 20,
              boxShadow: `0 0 20px ${detail.color.border}55`,
              animation: "fadeIn 0.2s ease",
            }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ flex: 1 }}>
                  <div style={{ color: detail.color.label, fontWeight: 700, fontSize: 14, marginBottom: 4 }}>
                    {detail.title}
                  </div>
                  <div style={{ color: detail.color.text, fontSize: 12.5, marginBottom: 8 }}>{detail.desc}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {detail.bullets.map((b, i) => (
                      <div key={i} style={{
                        background: `${detail.color.border}22`,
                        border: `1px solid ${detail.color.border}55`,
                        borderRadius: 6,
                        padding: "3px 8px",
                        color: detail.color.text,
                        fontSize: 11,
                      }}>{b}</div>
                    ))}
                  </div>
                </div>
                <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6, marginLeft: 12 }}>
                  <div style={{
                    background: "#0f172a",
                    border: `1px solid ${detail.color.border}44`,
                    borderRadius: 6,
                    padding: "3px 8px",
                    color: "#64748b",
                    fontSize: 11,
                    fontFamily: "monospace",
                  }}>{detail.file}</div>
                  <button onClick={() => setActive(null)} style={{
                    background: "transparent",
                    border: "1px solid #475569",
                    color: "#94a3b8",
                    borderRadius: 6,
                    padding: "3px 10px",
                    cursor: "pointer",
                    fontSize: 11,
                  }}>✕ close</button>
                </div>
              </div>
            </div>
          )}

          {/* Main Layout */}
          <div style={{ display: "flex", gap: 16, alignItems: "stretch" }}>

            {/* LEFT: Data Sources */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, width: 170, flexShrink: 0 }}>
              <div style={{ color: "#475569", fontSize: 10, fontWeight: 700, textTransform: "uppercase",
                letterSpacing: 1, textAlign: "center" }}>Data Sources</div>
              <Box color={COLORS.data} icon="📈" title="Yahoo Finance"
                items={["Historical OHLCV", "200-day lookback", "SMA / RSI / BB"]} />
              <Box color={COLORS.data} icon="⚡" title="Alpaca Market Data"
                items={["Real-time snapshots", "Option chains + Greeks", "Delta / Theta / Vega"]} />
              <Box color={COLORS.alpaca} icon="🏦" title="Alpaca Paper API"
                items={["Account equity", "Market clock", "/v2/positions", "/v2/orders"]} />
            </div>

            {/* Arrow */}
            <Arrow color="#3b82f6" style={{ width: 28 }} />

            {/* CENTER: Agent Core */}
            <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 0, minWidth: 0 }}>

              <div style={{
                background: "#0f172a",
                border: "2px solid #1e293b",
                borderRadius: "12px 12px 0 0",
                padding: "8px 14px",
                display: "flex",
                alignItems: "center",
                gap: 8,
              }}>
                <span style={{ fontSize: 18 }}>🔄</span>
                <div>
                  <div style={{ color: "#f1f5f9", fontWeight: 700, fontSize: 13 }}>Agent Cycle (agent.py)</div>
                  <div style={{ color: "#475569", fontSize: 11 }}>Two-stage loop — runs periodically</div>
                </div>
              </div>

              {/* Cycle Guards */}
              <div style={{
                background: "#1a140a",
                border: "2px solid #1e293b",
                borderLeft: `3px solid ${COLORS.guard.border}`,
                borderRight: `3px solid ${COLORS.guard.border}`,
                padding: "8px 14px",
              }}>
                <div style={{ color: COLORS.guard.label, fontWeight: 700, fontSize: 12,
                  marginBottom: 6, display: "flex", alignItems: "center", gap: 6 }}>
                  <span>🛑</span> CYCLE GUARDS — run before every stage
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "stretch" }}>
                  <Box color={COLORS.guard} title="After-Hours Shutdown" icon="🕐"
                    items={["9:25 AM – 4:05 PM ET", "Mon–Fri only", "FORCE_MARKET_OPEN bypass"]}
                    onClick={() => toggle("guards")} active={active === "guards"} />
                  <Arrow color={COLORS.guard.border} />
                  <Box color={COLORS.guard} title="Drawdown Circuit Breaker" icon="📉"
                    items={["Daily loss limit check", "Persists in daily_state.json", "Halts all trading"]}
                    onClick={() => toggle("guards")} active={active === "guards"} />
                  <Arrow color={COLORS.guard.border} />
                  <Box color={COLORS.guard} title="Liquidation Mode" icon="⚠️"
                    items={["Buying power > 80%", "Skips new entries", "Monitor-only mode"]}
                    onClick={() => toggle("guards")} active={active === "guards"} />
                </div>
              </div>

              <div style={{ background: "#1e293b", height: 1 }} />

              {/* Stage 1 */}
              <div style={{
                background: "#0d1a0d",
                border: "2px solid #1e293b",
                borderLeft: `3px solid ${COLORS.monitor.border}`,
                borderRight: `3px solid ${COLORS.monitor.border}`,
                padding: "10px 14px",
              }}>
                <div style={{ color: COLORS.monitor.label, fontWeight: 700, fontSize: 12,
                  marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                  <span>🔍</span> STAGE 1 — Monitor Existing Positions
                </div>
                <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                  <Box color={COLORS.monitor} title="Position Monitor" icon="📊"
                    items={["Fetch open positions", "Group into spreads"]}
                    onClick={() => toggle("monitor")} active={active === "monitor"} />
                  <Arrow color={COLORS.monitor.border} />
                  <Box color={COLORS.monitor} title="Exit Signals" icon="🚦"
                    items={["Stop-Loss: 50% max loss", "Profit: 75% credit", "Regime Shift"]} />
                  <Arrow color={COLORS.monitor.border} />
                  <Box color={COLORS.execute} title="Order Tracker" icon="📋"
                    items={["Track fills", "Cancel stale", "Order history"]} />
                </div>
              </div>

              <div style={{ background: "#1e293b", height: 1 }} />

              {/* Stage 2 */}
              <div style={{
                background: "#0a0f1a",
                border: "2px solid #1e293b",
                borderLeft: `3px solid ${COLORS.plan.border}`,
                borderRight: `3px solid ${COLORS.plan.border}`,
                padding: "10px 14px",
              }}>
                <div style={{ color: COLORS.plan.label, fontWeight: 700, fontSize: 12,
                  marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                  <span>🎯</span> STAGE 2 — Open New Positions (Per Ticker: SPY, QQQ + configurable via TICKERS env)
                </div>

                <div style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
                  <Box color={COLORS.perceive} title="I · Perceive" icon="👁"
                    items={["yfinance 200d", "Alpaca snapshot", "Cache prices"]}
                    onClick={() => toggle("perceive")} active={active === "perceive"} />
                  <Arrow color={COLORS.perceive.border} />

                  <Box color={COLORS.classify} title="II · Classify" icon="🧭"
                    items={["SMA-50/200", "BB + MR signal", "RS vs SPY/QQQ", "IV Rank"]}
                    onClick={() => toggle("classify")} active={active === "classify"} />
                  <Arrow color={COLORS.classify.border} />

                  {/* Inline guards between classify and plan */}
                  <div style={{ display: "flex", flexDirection: "column", gap: 4, flex: 0.8, minWidth: 0 }}>
                    <div style={{
                      background: COLORS.guard.bg,
                      border: `1px solid ${COLORS.guard.border}88`,
                      borderRadius: 7, padding: "4px 8px", fontSize: 10,
                      color: COLORS.guard.text, textAlign: "center",
                    }}>🛡 Macro Guard<br/><span style={{color:"#94a3b8"}}>price &lt; SMA-200<br/>blocks bull spreads</span></div>
                    <div style={{
                      background: COLORS.guard.bg,
                      border: `1px solid ${COLORS.guard.border}88`,
                      borderRadius: 7, padding: "4px 8px", fontSize: 10,
                      color: COLORS.guard.text, textAlign: "center",
                    }}>🌡 High-IV Block<br/><span style={{color:"#94a3b8"}}>IV rank &gt; 95th pct<br/>blocks all entries</span></div>
                  </div>
                  <Arrow color={COLORS.plan.border} />

                  <Box color={COLORS.plan} title="III · Plan" icon="📐"
                    items={["Select strategy", "Pick strikes", "45 DTE target"]}
                    onClick={() => toggle("plan")} active={active === "plan"} />
                  <Arrow color={COLORS.plan.border} />

                  <Box color={COLORS.risk} title="IV · Risk" icon="🛡"
                    items={["8 guardrails", "Max loss 2%", "Paper only", "BP ≤ 80%"]}
                    onClick={() => toggle("risk")} active={active === "risk"} />
                  <Arrow color={COLORS.risk.border} />

                  <Box color={COLORS.llm} title="V · LLM" icon="🧠"
                    items={["RAG context", "Approve/Skip", "Confidence"]}
                    onClick={() => toggle("llm")} active={active === "llm"} />
                  <Arrow color={COLORS.execute.border} />

                  <Box color={COLORS.execute} title="VI · Execute" icon="⚡"
                    items={["mleg order", "Alpaca API", "Journal entry"]} />
                </div>

                {/* Tiered Sentiment Pipeline — submitted after Phase II, resolved at Phase V */}
                <div style={{
                  marginTop: 10,
                  background: COLORS.sentiment.bg,
                  border: `1.5px dashed ${COLORS.sentiment.border}`,
                  borderRadius: 8,
                  padding: "8px 10px",
                }}>
                  <div style={{
                    color: COLORS.sentiment.label, fontWeight: 700, fontSize: 11,
                    marginBottom: 6, display: "flex", alignItems: "center", gap: 6,
                  }}>
                    <span>🧾</span> SENTIMENT PIPELINE — submitted after Phase II · cancelled on plan/risk reject · resolved at Phase V
                    <span style={{ color: "#64748b", fontWeight: 400, fontSize: 10, marginLeft: 6 }}>
                      (cycle-scoped ThreadPoolExecutor)
                    </span>
                  </div>
                  <div style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
                    <Box color={COLORS.guard} title="Tier 0 · Earnings" icon="📅"
                      items={["yfinance calendar", "≤ 7d lookahead", "event_risk = 1.0", "no LLM call"]}
                      onClick={() => toggle("earnings")} active={active === "earnings"} />
                    <Arrow color={COLORS.sentiment.border} />
                    <Box color={COLORS.sentiment} title="Tier 1 · Hash Cache" icon="#️⃣"
                      items={["SHA-1 of evidence", "source|slug|minute", "TTL + LRU bound", "replays verified"]}
                      onClick={() => toggle("hashcache")} active={active === "hashcache"} />
                    <Arrow color={COLORS.sentiment.border} />
                    <Box color={COLORS.sentiment} title="Tier 2 · News" icon="📰"
                      items={["Yahoo / SEC / Fed", "Reddit / Twitter", "source-weighted", "NewsItem list"]}
                      onClick={() => toggle("news")} active={active === "news"} />
                    <Arrow color={COLORS.sentiment.border} />
                    <Box color={COLORS.sentiment} title="Tier 2 · FinGPT" icon="🤖"
                      items={["Specialist LLM", "temp=0.1", "SentimentReport", "event_risk score"]}
                      onClick={() => toggle("fingpt")} active={active === "fingpt"} />
                    <Arrow color={COLORS.sentiment.border} />
                    <Box color={COLORS.sentiment} title="Tier 2 · Verifier" icon="🔬"
                      items={["qwq / deepseek-r1", "claim-by-claim check", "hallucination flags", "agreement score"]}
                      onClick={() => toggle("verifier")} active={active === "verifier"} />
                  </div>
                  <div style={{
                    marginTop: 6, color: "#94a3b8", fontSize: 10,
                    display: "flex", gap: 10, flexWrap: "wrap",
                  }}>
                    <span>• Cache only stores reports that passed Tier-2 verifier</span>
                    <span>• Each tier is stricter than the next, not looser</span>
                    <span>• Advisory to Phase V — never overrides the risk manager</span>
                  </div>
                </div>

                {/* Regime → Strategy */}
                <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                  {[
                    { regime: "BULLISH", strategy: "Bull Put Spread", color: COLORS.perceive },
                    { regime: "BEARISH", strategy: "Bear Call Spread", color: COLORS.risk },
                    { regime: "SIDEWAYS", strategy: "Iron Condor", color: COLORS.classify },
                    { regime: "MEAN REVERSION", strategy: "Counter-Trend Spread", color: COLORS.guard },
                  ].map((r) => (
                    <div key={r.regime} style={{
                      flex: 1, background: r.color.bg,
                      border: `1px solid ${r.color.border}55`,
                      borderRadius: 7, padding: "5px 8px",
                      display: "flex", alignItems: "center", gap: 6,
                    }}>
                      <span style={{ color: r.color.label, fontSize: 11, fontWeight: 700 }}>{r.regime}</span>
                      <span style={{ color: "#475569", fontSize: 11 }}>→</span>
                      <span style={{ color: r.color.text, fontSize: 11 }}>{r.strategy}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Footer */}
              <div style={{
                background: "#0f172a",
                border: "2px solid #1e293b",
                borderTop: "none",
                borderRadius: "0 0 12px 12px",
                padding: "6px 14px",
                display: "flex",
                gap: 16,
                flexWrap: "wrap",
              }}>
                {[
                  { label: "Max Loss", value: "(Width − Credit) × 100", color: COLORS.risk },
                  { label: "Min Credit Ratio", value: "≥ 33% of spread width", color: COLORS.plan },
                  { label: "Sold Delta", value: "≤ 0.20 (OTM, ≈80% POP)", color: COLORS.classify },
                  { label: "Buying Power Cap", value: "≤ 80% of equity", color: COLORS.guard },
                ].map((g) => (
                  <div key={g.label} style={{ display: "flex", gap: 5, alignItems: "center" }}>
                    <span style={{ color: "#475569", fontSize: 11 }}>{g.label}:</span>
                    <span style={{ color: g.color.text, fontSize: 11, fontWeight: 600 }}>{g.value}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* Arrow */}
            <Arrow color="#8b5cf6" style={{ width: 28 }} />

            {/* RIGHT: Intelligence Layer */}
            <div style={{ display: "flex", flexDirection: "column", gap: 8, width: 190, flexShrink: 0 }}>
              <div style={{ color: "#475569", fontSize: 10, fontWeight: 700, textTransform: "uppercase",
                letterSpacing: 1, textAlign: "center" }}>Intelligence &amp; Reporting</div>

              <Box color={COLORS.intelligence} icon="🧠" title="LLM Client"
                items={["make_llm_client(role)", "One config per role", "Swappable provider"]}
                onClick={() => toggle("intelligence")} active={active === "intelligence"} />

              <Box color={COLORS.intelligence} icon="📚" title="Knowledge Base (RAG)"
                items={["nomic-embed-text", "Cosine similarity", "Trades + Lessons"]}
                onClick={() => toggle("intelligence")} active={active === "intelligence"} />

              <Box color={COLORS.intelligence} icon="📓" title="Trade Journal + KB"
                items={["Full lifecycle log", "signals.jsonl (JournalKB)", "Win/loss stats"]}
                onClick={() => toggle("intelligence")} active={active === "intelligence"} />

              <Box color={COLORS.sentiment} icon="🧾" title="Sentiment Pipeline"
                items={["Facade over 3 tiers", "Cycle-scoped pool", "No-hallucination gate"]}
                onClick={() => toggle("sentiment_pipeline")} active={active === "sentiment_pipeline"} />

              <Box color={COLORS.storage} icon="🎓" title="Fine-Tuning Pipeline"
                items={["Chat JSONL", "Alpaca format", "DPO pairs"]}
                onClick={() => toggle("finetune")} active={active === "finetune"} />

              <Box color={COLORS.report} icon="📊" title="Reporting"
                items={["daily_report.html", "trade_plan_{TICKER}.html", "Plotly charts"]}
                onClick={() => toggle("reporting")} active={active === "reporting"} />
            </div>
          </div>

          {/* Learning Loop */}
          <div style={{ marginTop: 16 }}>
            <div style={{ color: "#475569", fontSize: 10, fontWeight: 700, textTransform: "uppercase",
              letterSpacing: 1, textAlign: "center", marginBottom: 8 }}>Learning Loop</div>
            <div style={{
              background: "#0a0f1a",
              border: "2px dashed #1e3a5f",
              borderRadius: 10,
              padding: "10px 16px",
              display: "flex",
              alignItems: "center",
              gap: 0,
            }}>
              {[
                { icon: "⚡", label: "Trade Executes", color: COLORS.execute },
                { arrow: true, label: "fills", color: "#10b981" },
                { icon: "📓", label: "Journal Entry\nOpened", color: COLORS.intelligence },
                { arrow: true, label: "closes", color: "#8b5cf6" },
                { icon: "🔍", label: "LLM Post-Trade\nAnalysis", color: COLORS.llm },
                { arrow: true, label: "extracts", color: "#06b6d4" },
                { icon: "💡", label: "Lessons →\nKnowledge Base", color: COLORS.storage },
                { arrow: true, label: "informs", color: "#a855f7" },
                { icon: "🧠", label: "Better Decisions\nNext Cycle", color: COLORS.classify },
                { arrow: true, label: "after 20+ trades", color: "#eab308" },
                { icon: "🎓", label: "Fine-Tune\nLocal Model", color: COLORS.storage },
                { arrow: true, label: "visualized by", color: "#0d9488" },
                { icon: "📊", label: "Daily Report\ndaily_report.html", color: COLORS.report },
              ].map((item, i) =>
                item.arrow ? (
                  <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column",
                    alignItems: "center", gap: 2 }}>
                    {item.label && <span style={{ color: "#475569", fontSize: 9,
                      whiteSpace: "nowrap" }}>{item.label}</span>}
                    <div style={{ width: "100%", height: 2,
                      background: `linear-gradient(to right, ${item.color}55, ${item.color})`,
                      position: "relative" }}>
                      <div style={{ position: "absolute", right: -1, top: "50%",
                        transform: "translateY(-50%)", width: 0, height: 0,
                        borderTop: "4px solid transparent",
                        borderBottom: "4px solid transparent",
                        borderLeft: `5px solid ${item.color}` }} />
                    </div>
                  </div>
                ) : (
                  <div key={i} style={{
                    background: item.color.bg,
                    border: `1px solid ${item.color.border}`,
                    borderRadius: 8,
                    padding: "6px 10px",
                    textAlign: "center",
                    flexShrink: 0,
                  }}>
                    <div style={{ fontSize: 16 }}>{item.icon}</div>
                    <div style={{ color: item.color.text, fontSize: 10, fontWeight: 600,
                      whiteSpace: "pre-line", lineHeight: 1.3 }}>{item.label}</div>
                  </div>
                )
              )}
            </div>
          </div>

          {/* Legend */}
          <div style={{ display: "flex", gap: 12, justifyContent: "center",
            marginTop: 14, flexWrap: "wrap" }}>
            {[
              { color: COLORS.data, label: "Market Data" },
              { color: COLORS.guard, label: "Cycle Guards / Tier 0" },
              { color: COLORS.monitor, label: "Position Monitor" },
              { color: COLORS.perceive, label: "Phases I-II" },
              { color: COLORS.plan, label: "Phases III-IV" },
              { color: COLORS.llm, label: "LLM Phase V" },
              { color: COLORS.execute, label: "Execution" },
              { color: COLORS.intelligence, label: "Intelligence" },
              { color: COLORS.sentiment, label: "Sentiment Pipeline" },
              { color: COLORS.storage, label: "Fine-Tuning" },
              { color: COLORS.report, label: "Reporting" },
            ].map((l) => (
              <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3,
                  background: l.color.bg, border: `2px solid ${l.color.border}` }} />
                <span style={{ color: "#64748b", fontSize: 11 }}>{l.label}</span>
              </div>
            ))}
          </div>

          <div style={{ textAlign: "center", color: "#334155", fontSize: 11, marginTop: 12 }}>
            Tiered sentiment pipeline · cycle-scoped pool · SPY QQQ (+ configurable) · Alpaca Paper Trading · 8 risk guardrails
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
